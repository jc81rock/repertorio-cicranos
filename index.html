<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cicranos Rock - Repertório</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;margin:0;padding:20px}
h1{text-align:center;color:#e00000}
nav{text-align:center;margin-bottom:20px}
button{background:#e00000;color:#fff;border:none;padding:10px;margin:5px;border-radius:6px;cursor:pointer}
button:hover{opacity:.9}
section{display:none;background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:20px}
section.ativo{display:block}
input{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;box-sizing:border-box}
ul{list-style:none;padding:0}
li{background:#2a2a2a;margin:6px 0;padding:10px;border-radius:6px}
.teclado{border-left:5px solid red}
.musica-item{display:flex;gap:10px;align-items:center;background:#2a2a2a;margin:6px 0;padding:10px;border-radius:6px}
.musica-item input{width:auto;margin:0;flex:0 0 auto}
.musica-texto{line-height:1.35}
.numero-lilas{color:#b66cff;font-weight:bold}
.tipo-musica{color:#bbb;font-size:.9em}
#resultado{white-space:pre-line;background:#000;padding:15px;border-radius:8px;min-height:80px}
#resultado .numero-lilas{color:#b66cff;font-weight:bold}
</style>
</head>

<body>

<h1>Cicranos Rock - Repertório</h1>

<nav>
<button onclick="abrir('montar')">Montar Repertório</button>
<button onclick="abrir('teclado')">Com Teclado</button>
<button onclick="abrir('semteclado')">Sem Teclado</button>
<button onclick="abrir('nacionais')">Nacionais</button>
</nav>

<section id="montar" class="ativo">
<h2>Montar Repertório</h2>

<input id="local" placeholder="Nome do lugar / evento">
<input id="data" type="date">

<h3>Escolha as músicas</h3>
<div id="listaMusicas"></div>

<button onclick="gerarRepertorio()">Gerar Repertório</button>
<button onclick="salvarPDF()">Salvar em PDF</button>
<button onclick="limparSelecao()">Limpar Seleção</button>

<h3>Repertório Final</h3>
<div id="resultado"></div>
</section>

<section id="teclado">
<h2>Com Teclado</h2>
<ul id="listaTeclado"></ul>
</section>

<section id="semteclado">
<h2>Sem Teclado</h2>
<ul id="listaSemTeclado"></ul>
</section>

<section id="nacionais">
<h2>Nacionais</h2>
<ul id="listaNacionais"></ul>
</section>

<script>
const comTeclado = [
"You Give Love a Bad Name",
"Crazy Little Thing Called Love",
"Easy",
"Killing Moon",
"Money For Nothing",
"The Wall",
"In Between Days",
"Don't You Forget About Me",
"Enjoy The Silence",
"Walk Of Life",
"Boys Don't Cry",
"The Final Countdown",
"Jump"
];

const semTeclado = [
{nome:"Sultans of Swing", numero:"82"},
{nome:"One Last Breath", numero:"23"},
{nome:"Like a Stone", numero:"45"},
{nome:"I Am Mine", numero:"35"},
{nome:"Suedehead", numero:"81"},
{nome:"The One I Love", numero:"83"},
{nome:"Creep", numero:"24"},
{nome:"My Hero"},
{nome:"Mama I'm Coming Home"},
{nome:"My Sacrifice"},
{nome:"Lonely Day"},
{nome:"Plush"},
{nome:"Scar Tissue"},
{nome:"Don't Look Back In Anger"},
{nome:"Born To Be Wild"},
{nome:"Poison Heart"},
{nome:"Learn To Fly"},
{nome:"Pet Sematary"},
{nome:"Freak"},
{nome:"Even Flow"},
{nome:"Breaking The Law"},
{nome:"Rock And Roll All Nite"},
{nome:"Seek & Destroy"},
{nome:"Enter Sandman"},
{nome:"Aerials"},
{nome:"Toxicity"}
];

const nacionais = [
"Camila, Camila",
"Toda Forma de Poder",
"Segredos",
"À Sua Maneira",
"O Tempo Não Para",
"Anna Júlia",
"Tempo Perdido",
"A Mais Pedida",
"O Poeta Está Vivo",
"Por Que a Gente É Assim",
"I Say You Saying",
"Mulher de Fases",
"Bete Balanço",
"Há Tempos",
"Eu Era um Lobisomem Juvenil",
"Eu Sei",
"Que País É Este",
"Até Quando Esperar",
"Homem Primata",
"Será",
"Fátima",
"Zóio de Lula",
"Só Por Uma Noite",
"Te Levar",
"Do Seu Lado",
"Meu Erro",
"Cowboy Fora da Lei",
"Dias de Luta",
"Envelheço na Cidade",
"Caso Sério",
"Ideologia",
"Pense e Dance",
"Lugar Nenhum",
"Me Lambe"
];

const todas = [
...comTeclado.map(m => ({nome:m, tipo:"Com teclado"})),
...semTeclado.map(m => ({nome:m.nome, tipo:"Sem teclado", numero:m.numero || ""})),
...nacionais.map(m => ({nome:m, tipo:"Nacional"}))
].map((m, index) => ({...m, id:`musica_${index}`}));

let ordemEscolha = [];
let ultimoTextoPDF = "";

function abrir(id){
  document.querySelectorAll("section").forEach(sec => sec.classList.remove("ativo"));
  document.getElementById(id).classList.add("ativo");
}

function criarTextoMusica(m){
  const span = document.createElement("span");
  span.className = "musica-texto";

  if(m.numero){
    const numero = document.createElement("span");
    numero.className = "numero-lilas";
    numero.textContent = m.numero;
    span.appendChild(numero);
    span.appendChild(document.createTextNode(" - "));
  }

  span.appendChild(document.createTextNode(`${m.nome} - `));

  const tipo = document.createElement("span");
  tipo.className = "tipo-musica";
  tipo.textContent = m.tipo;
  span.appendChild(tipo);

  return span;
}

function carregarListas(){
  const listaMusicas = document.getElementById("listaMusicas");
  const listaTeclado = document.getElementById("listaTeclado");
  const listaSemTeclado = document.getElementById("listaSemTeclado");
  const listaNacionais = document.getElementById("listaNacionais");

  todas.forEach((m) => {
    const label = document.createElement("label");
    label.className = "musica-item";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = m.nome;
    checkbox.dataset.id = m.id;
    checkbox.dataset.tipo = m.tipo;
    checkbox.dataset.numero = m.numero || "";

    checkbox.addEventListener("change", function(){
      if(this.checked){
        if(!ordemEscolha.includes(m.id)) ordemEscolha.push(m.id);
      }else{
        ordemEscolha = ordemEscolha.filter(id => id !== m.id);
      }
      salvarEstadoSelecao();
    });

    label.appendChild(checkbox);
    label.appendChild(criarTextoMusica(m));
    listaMusicas.appendChild(label);
  });

  comTeclado.forEach(m => {
    const li = document.createElement("li");
    li.className = "teclado";
    li.textContent = m;
    listaTeclado.appendChild(li);
  });

  semTeclado.forEach(m => {
    const li = document.createElement("li");
    if(m.numero){
      const numero = document.createElement("span");
      numero.className = "numero-lilas";
      numero.textContent = m.numero;
      li.appendChild(numero);
      li.appendChild(document.createTextNode(" - "));
    }
    li.appendChild(document.createTextNode(m.nome));
    listaSemTeclado.appendChild(li);
  });

  nacionais.forEach(m => {
    const li = document.createElement("li");
    li.textContent = m;
    listaNacionais.appendChild(li);
  });
}

function salvarEstadoSelecao(){
  localStorage.setItem("ordemEscolha", JSON.stringify(ordemEscolha));
}

function montarLinha(m, index){
  const teclado = m.tipo === "Com teclado" ? " [TECLADO]" : "";
  const numero = m.numero || String(index + 1).padStart(2,"0");
  return `${numero} - ${m.nome}${teclado}`;
}

function montarLinhaHTML(m, index){
  const teclado = m.tipo === "Com teclado" ? " [TECLADO]" : "";
  const numero = m.numero || String(index + 1).padStart(2,"0");

  if(m.numero){
    return `<span class="numero-lilas">${numero}</span> - ${escapeHTML(m.nome)}${teclado}`;
  }

  return `${numero} - ${escapeHTML(m.nome)}${teclado}`;
}

function escapeHTML(texto){
  return String(texto)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function gerarRepertorio(){
  const local = document.getElementById("local").value;
  const data = document.getElementById("data").value;

  const selecionadas = ordemEscolha
    .map(id => todas.find(m => m.id === id))
    .filter(Boolean);

  if(selecionadas.length === 0){
    alert("Escolha pelo menos uma música.");
    return;
  }

  let textoPDF = `CICRANOS ROCK\n`;
  textoPDF += `Local: ${local || "Não informado"}\n`;
  textoPDF += `Data: ${data || "Não informada"}\n\n`;
  textoPDF += `REPERTÓRIO\n\n`;

  let html = `CICRANOS ROCK\n`;
  html += `Local: ${escapeHTML(local || "Não informado")}\n`;
  html += `Data: ${escapeHTML(data || "Não informada")}\n\n`;
  html += `REPERTÓRIO\n\n`;

  selecionadas.forEach((m, index) => {
    textoPDF += `${montarLinha(m, index)}\n`;
    html += `${montarLinhaHTML(m, index)}\n`;
  });

  ultimoTextoPDF = textoPDF;
  document.getElementById("resultado").innerHTML = html;

  localStorage.setItem("ultimoRepertorioHTML", html);
  localStorage.setItem("ultimoRepertorioPDF", textoPDF);
  salvarEstadoSelecao();
}

function salvarPDF(){
  const resultado = ultimoTextoPDF || localStorage.getItem("ultimoRepertorioPDF") || "";

  if(!resultado.trim()){
    alert("Gere um repertório antes de salvar.");
    return;
  }

  if(!window.jspdf){
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    script.onload = () => criarPDF(resultado);
    script.onerror = () => alert("Não foi possível carregar o gerador de PDF. Verifique a internet e tente novamente.");
    document.body.appendChild(script);
    return;
  }

  criarPDF(resultado);
}

function criarPDF(resultado){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const linhas = doc.splitTextToSize(resultado, 180);

  doc.setFont("helvetica","normal");
  doc.setFontSize(11);
  doc.text(linhas, 15, 20);

  const local = document.getElementById("local").value || "Show";
  const data = document.getElementById("data").value || "SemData";
  const nomeArquivo = `Cicranos_${local.replace(/[^a-z0-9]/gi,"_")}_${data}.pdf`;

  doc.save(nomeArquivo);
}

function limparSelecao(){
  document.querySelectorAll("#listaMusicas input").forEach(i => i.checked = false);
  ordemEscolha = [];
  ultimoTextoPDF = "";
  document.getElementById("resultado").innerText = "";
  localStorage.removeItem("ultimoRepertorioHTML");
  localStorage.removeItem("ultimoRepertorioPDF");
  localStorage.removeItem("ordemEscolha");
}

function restaurarEstado(){
  ordemEscolha = JSON.parse(localStorage.getItem("ordemEscolha") || "[]");

  document.querySelectorAll("#listaMusicas input").forEach(input => {
    if(ordemEscolha.includes(input.dataset.id)){
      input.checked = true;
    }
  });

  const htmlSalvo = localStorage.getItem("ultimoRepertorioHTML") || "";
  const pdfSalvo = localStorage.getItem("ultimoRepertorioPDF") || "";

  ultimoTextoPDF = pdfSalvo;
  document.getElementById("resultado").innerHTML = htmlSalvo;
}

window.addEventListener("DOMContentLoaded", function(){
  carregarListas();
  restaurarEstado();
});
</script>

</body>
</html>
