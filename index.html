<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cicranos Rock - Repertório</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;margin:0;padding:20px}
h1{text-align:center;color:#e00000;margin-bottom:5px}
.subtitulo{text-align:center;color:#ccc;margin-bottom:20px;font-size:14px}
nav{text-align:center;margin-bottom:20px}
button{background:#e00000;color:#fff;border:none;padding:10px;margin:5px;border-radius:6px;cursor:pointer;font-weight:bold}
button:hover{background:#b80000}
section{display:none;background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:20px}
section.ativo{display:block}
input{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;box-sizing:border-box}
ul{list-style:none;padding:0}
li{background:#2a2a2a;margin:6px 0;padding:10px;border-radius:6px}
.teclado{border-left:5px solid red}
.musica-item{display:flex;gap:10px;align-items:center;background:#2a2a2a;margin:6px 0;padding:10px;border-radius:6px}
.musica-item input{width:auto}
.leo{color:#c05cff;font-weight:bold;min-width:35px;display:inline-block;text-align:right}
.tipo{color:#aaa;font-size:12px;margin-left:auto}
#resultado{white-space:pre-line;background:#000;padding:15px;border-radius:8px;font-family:Consolas,monospace;line-height:1.5}
.aviso{font-size:13px;color:#ccc;margin-top:8px}
</style>
</head>
<body>
<h1>Cicranos Rock - Repertório</h1>
<div class="subtitulo">Ordem por clique | Nº Leo | Música</div>
<nav>
<button onclick="abrir('montar')">Montar Repertório</button>
<button onclick="abrir('teclado')">Com Teclado</button>
<button onclick="abrir('semteclado')">Sem Teclado</button>
<button onclick="abrir('nacionais')">Nacionais</button>
</nav>
<section id="montar" class="ativo">
<h2>Montar Repertório</h2>
<input id="local" placeholder="Nome do lugar / evento">
<input id="data" type="date">
<h3>Escolha as músicas</h3>
<div class="aviso">A lista final será montada exatamente na ordem em que as músicas forem selecionadas.</div>
<div id="listaMusicas"></div>
<button onclick="gerarRepertorio()">Gerar Repertório</button>
<button onclick="salvarPDF()">Salvar em PDF</button>
<button onclick="limparSelecao()">Limpar Seleção</button>
<h3>Repertório Final</h3>
<div id="resultado"></div>
</section>
<section id="teclado"><h2>Com Teclado</h2><ul id="listaTeclado"></ul></section>
<section id="semteclado"><h2>Sem Teclado</h2><ul id="listaSemTeclado"></ul></section>
<section id="nacionais"><h2>Nacionais</h2><ul id="listaNacionais"></ul></section>
<script>
const comTeclado = [
{leo:"66", nome:"You Give Love a Bad Name"},
{leo:"22", nome:"Crazy Little Thing Called Love"},
{leo:"84", nome:"Easy"},
{leo:"70", nome:"Killing Moon"},
{leo:"47", nome:"Money For Nothing"},
{leo:"--", nome:"The Wall"},
{leo:"38", nome:"In Between Days"},
{leo:"75", nome:"Don't You Forget About Me"},
{leo:"27", nome:"Enjoy The Silence"},
{leo:"14", nome:"Walk Of Life"},
{leo:"85", nome:"Boys Don't Cry"},
{leo:"61", nome:"The Final Countdown"},
{leo:"43", nome:"Jump"}
];
const semTeclado = [
{leo:"82", nome:"Sultans of Swing"},
{leo:"23", nome:"One Last Breath"},
{leo:"45", nome:"Like a Stone"},
{leo:"35", nome:"I Am Mine"},
{leo:"81", nome:"Suedehead"},
{leo:"83", nome:"The One I Love"},
{leo:"24", nome:"Creep"},
{leo:"89", nome:"My Hero"},
{leo:"46", nome:"Mama I'm Coming Home"},
{leo:"48", nome:"My Sacrifice"},
{leo:"03", nome:"Lonely Day"},
{leo:"86", nome:"Plush"},
{leo:"79", nome:"Scar Tissue"},
{leo:"00", nome:"Don't Look Back In Anger"},
{leo:"52", nome:"Born To Be Wild"},
{leo:"54", nome:"Poison Heart"},
{leo:"16", nome:"Learn To Fly"},
{leo:"53", nome:"Pet Sematary"},
{leo:"102", nome:"Freak"},
{leo:"00", nome:"Even Flow"},
{leo:"74", nome:"Breaking The Law"},
{leo:"76", nome:"Rock And Roll All Nite"},
{leo:"99", nome:"Seek & Destroy"},
{leo:"09", nome:"Enter Sandman"},
{leo:"01", nome:"Aerials"},
{leo:"02", nome:"Toxicity"}
];
const nacionais = [
{leo:"--", nome:"Camila, Camila"},
{leo:"--", nome:"Toda Forma de Poder"},
{leo:"--", nome:"Segredos"},
{leo:"--", nome:"À Sua Maneira"},
{leo:"--", nome:"O Tempo Não Para"},
{leo:"--", nome:"Anna Júlia"},
{leo:"--", nome:"Tempo Perdido"},
{leo:"--", nome:"A Mais Pedida"},
{leo:"--", nome:"O Poeta Está Vivo"},
{leo:"--", nome:"Por Que a Gente É Assim"},
{leo:"--", nome:"I Say You Saying"},
{leo:"--", nome:"Mulher de Fases"},
{leo:"--", nome:"Bete Balanço"},
{leo:"--", nome:"Há Tempos"},
{leo:"--", nome:"Eu Era um Lobisomem Juvenil"},
{leo:"--", nome:"Eu Sei"},
{leo:"--", nome:"Que País É Este"},
{leo:"--", nome:"Até Quando Esperar"},
{leo:"--", nome:"Homem Primata"},
{leo:"--", nome:"Será"},
{leo:"--", nome:"Fátima"},
{leo:"--", nome:"Zóio de Lula"},
{leo:"--", nome:"Só Por Uma Noite"},
{leo:"--", nome:"Te Levar"},
{leo:"--", nome:"Do Seu Lado"},
{leo:"--", nome:"Meu Erro"},
{leo:"--", nome:"Cowboy Fora da Lei"},
{leo:"--", nome:"Dias de Luta"},
{leo:"--", nome:"Envelheço na Cidade"},
{leo:"--", nome:"Caso Sério"},
{leo:"--", nome:"Ideologia"},
{leo:"--", nome:"Pense e Dance"},
{leo:"--", nome:"Lugar Nenhum"},
{leo:"--", nome:"Me Lambe"}
];
const todas = [
...comTeclado.map(m => ({...m, tipo:"Com teclado"})),
...semTeclado.map(m => ({...m, tipo:"Sem teclado"})),
...nacionais.map(m => ({...m, tipo:"Nacional"}))
];
let ordemEscolha = JSON.parse(localStorage.getItem("ordemEscolha") || "[]");
function abrir(id){document.querySelectorAll("section").forEach(sec=>sec.classList.remove("ativo"));document.getElementById(id).classList.add("ativo");}
function musicaId(m){return `${m.tipo}__${m.nome}`;}
function formatarItemLista(m){return `<span class="leo">${m.leo}</span> - ${m.nome} <span class="tipo">${m.tipo}</span>`;}
function carregarListas(){
 const listaMusicas=document.getElementById("listaMusicas");
 todas.forEach(m=>{
  const id=musicaId(m);
  listaMusicas.innerHTML += `<label class="musica-item"><input type="checkbox" value="${id}" data-nome="${m.nome}" data-leo="${m.leo}" data-tipo="${m.tipo}">${formatarItemLista(m)}</label>`;
 });
 comTeclado.forEach(m=>document.getElementById("listaTeclado").innerHTML+=`<li class="teclado"><span class="leo">${m.leo}</span> - ${m.nome}</li>`);
 semTeclado.forEach(m=>document.getElementById("listaSemTeclado").innerHTML+=`<li><span class="leo">${m.leo}</span> - ${m.nome}</li>`);
 nacionais.forEach(m=>document.getElementById("listaNacionais").innerHTML+=`<li><span class="leo">${m.leo}</span> - ${m.nome}</li>`);
}
function registrarOrdemEscolha(){
 document.querySelectorAll("#listaMusicas input[type='checkbox']").forEach(input=>{
  if(ordemEscolha.includes(input.value)){input.checked=true;}
  input.addEventListener("change",function(){
   if(this.checked){if(!ordemEscolha.includes(this.value)){ordemEscolha.push(this.value);}}
   else{ordemEscolha=ordemEscolha.filter(id=>id!==this.value);}
   localStorage.setItem("ordemEscolha",JSON.stringify(ordemEscolha));
  });
 });
}
function gerarRepertorio(){
 const local=document.getElementById("local").value;
 const data=document.getElementById("data").value;
 const inputs=[...document.querySelectorAll("#listaMusicas input")];
 const escolhidas=ordemEscolha.map(id=>inputs.find(i=>i.value===id && i.checked)).filter(Boolean);
 if(escolhidas.length===0){alert("Escolha pelo menos uma música.");return;}
 let texto=`CICRANOS ROCK\n`;
 texto+=`Local: ${local || "Não informado"}\n`;
 texto+=`Data: ${data || "Não informada"}\n\n`;
 texto+=`REPERTÓRIO\n\n`;
 escolhidas.forEach((item,index)=>{
  const seq=String(index+1).padStart(2,"0");
  const leo=String(item.dataset.leo || "--").padStart(2,"0");
  const teclado=item.dataset.tipo==="Com teclado" ? " [TECLADO]" : "";
  texto+=`${seq} | ${leo} | ${item.dataset.nome}${teclado}\n`;
 });
 document.getElementById("resultado").innerText=texto;
 localStorage.setItem("ultimoRepertorio",texto);
}
function salvarPDF(){
 const resultado=document.getElementById("resultado").innerText;
 if(!resultado.trim()){alert("Gere um repertório antes de salvar.");return;}
 const { jsPDF }=window.jspdf;
 const doc=new jsPDF();
 const linhas=doc.splitTextToSize(resultado,180);
 doc.setFont("helvetica","normal");doc.setFontSize(11);doc.text(linhas,15,20);
 const local=document.getElementById("local").value||"Show";
 const data=document.getElementById("data").value||"SemData";
 const nomeArquivo=`Cicranos_${local.replace(/[^a-z0-9]/gi,"_")}_${data}.pdf`;
 doc.save(nomeArquivo);
}
function limparSelecao(){
 document.querySelectorAll("#listaMusicas input").forEach(i=>i.checked=false);
 ordemEscolha=[];
 document.getElementById("resultado").innerText="";
 localStorage.removeItem("ultimoRepertorio");
 localStorage.removeItem("ordemEscolha");
}
carregarListas();
registrarOrdemEscolha();
document.getElementById("resultado").innerText=localStorage.getItem("ultimoRepertorio")||"";
</script>
</body>
</html>
